main:
  push:
    - services:
        - name: "docker"  # 显式字符串
          options:
            rootlessBuildkitd:
              enabled: true
      docker:
        image: "docker:27-cli"  # 建议镜像名也加引号（可选）
        volumes:
          - type: cache
            source: "buildx_cache"  # 缓存卷名称加引号
            target: "/.cache/buildx"
      stages:
        - name: "publish architecture images"  # 显式字符串
          script: "sh scripts/cnb-publish-images.sh"  # 脚本命令加引号（可选）

$:
  tag_push:
    - services:
        - name: "docker"  # 显式字符串
          options:
            rootlessBuildkitd:
              enabled: true
      docker:
        image: "docker:27-cli"
        volumes:
          - type: cache
            source: "buildx_cache"
            target: "/.cache/buildx"
      stages:
        - name: "publish release architecture images"  # 显式字符串
          script: "sh scripts/cnb-publish-images.sh"