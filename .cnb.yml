main:
  push:
    - name: "push-main-job"  # Job必填name字段（字符串）
      services:
        - name: "docker"
          options:
            rootlessBuildkitd:
              enabled: true
      docker:
        image: "docker:27-cli"
        volumes:
          - type: cache
            source: "buildx_cache"
            target: "/.cache/buildx"
      stages:
        - name: "publish architecture images"
          script: "sh scripts/cnb-publish-images.sh"

$:
  tag_push:
    - name: "tag-push-job"  # Job必填name字段（字符串）
      services:
        - name: "docker"
          options:
            rootlessBuildkitd:
              enabled: true
      docker:
        image: "docker:27-cli"
        volumes:
          - type: cache
            source: "buildx_cache"
            target: "/.cache/buildx"
      stages:
        - name: "publish release architecture images"
          script: "sh scripts/cnb-publish-images.sh"