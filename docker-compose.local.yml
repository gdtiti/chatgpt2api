services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api:local
    container_name: chatgpt2api-local
    ports:
      - "${CHATGPT2API_HOST_PORT:-8000}:${CHATGPT2API_PORT:-80}"
    environment:
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY:-}
      CHATGPT2API_REFRESH_ACCOUNT_INTERVAL_MINUTE: ${CHATGPT2API_REFRESH_ACCOUNT_INTERVAL_MINUTE:-}
      CHATGPT2API_PROXY: ${CHATGPT2API_PROXY:-}
      CHATGPT2API_BASE_URL: ${CHATGPT2API_BASE_URL:-}
      CHATGPT2API_PORT: ${CHATGPT2API_PORT:-}
      CHATGPT2API_IMAGE_FAILURE_STRATEGY: ${CHATGPT2API_IMAGE_FAILURE_STRATEGY:-}
      CHATGPT2API_IMAGE_RETRY_COUNT: ${CHATGPT2API_IMAGE_RETRY_COUNT:-}
      CHATGPT2API_IMAGE_PARALLEL_ATTEMPTS: ${CHATGPT2API_IMAGE_PARALLEL_ATTEMPTS:-}
      CHATGPT2API_IMAGE_PLACEHOLDER_PATH: ${CHATGPT2API_IMAGE_PLACEHOLDER_PATH:-}
      CHATGPT2API_IMAGE_RESPONSE_FORMAT: ${CHATGPT2API_IMAGE_RESPONSE_FORMAT:-}
      CHATGPT2API_IMAGE_THUMBNAIL_MAX_SIZE: ${CHATGPT2API_IMAGE_THUMBNAIL_MAX_SIZE:-}
      CHATGPT2API_IMAGE_THUMBNAIL_QUALITY: ${CHATGPT2API_IMAGE_THUMBNAIL_QUALITY:-}
      CHATGPT2API_IMAGE_WALL_THUMBNAIL_MAX_SIZE: ${CHATGPT2API_IMAGE_WALL_THUMBNAIL_MAX_SIZE:-}
      CHATGPT2API_IMAGE_RETENTION_DAYS: ${CHATGPT2API_IMAGE_RETENTION_DAYS:-}
      CHATGPT2API_TASK_LOG_RETENTION_DAYS: ${CHATGPT2API_TASK_LOG_RETENTION_DAYS:-}
      CHATGPT2API_SYSTEM_LOG_MAX_MB: ${CHATGPT2API_SYSTEM_LOG_MAX_MB:-}
      CHATGPT2API_DATA_CLEANUP_ENABLED: ${CHATGPT2API_DATA_CLEANUP_ENABLED:-}
      CHATGPT2API_DATA_CLEANUP_INTERVAL_MINUTES: ${CHATGPT2API_DATA_CLEANUP_INTERVAL_MINUTES:-}
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
